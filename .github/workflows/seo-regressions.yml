name: SEO Regressions

on:
  pull_request:
    branches: [main, master]

jobs:
  seo-check:
    name: Run SEO Regression Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SEO regression checks
        run: |
          bun run seo:check 2>&1 | tee seo-results.txt
          exit ${PIPESTATUS[0]}

      - name: Generate HTML summary
        if: always()
        run: bun run scripts/seo-results-to-html.ts seo-results.txt seo-results.html

      - name: Upload SEO regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-regression-results
          path: |
            seo-results.txt
            seo-results.html
